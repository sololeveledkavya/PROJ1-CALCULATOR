<!DOCTYPE html>
<html>
<head>
    <title>My Web Calculator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #282a36; color: white; }
        .calc-card { background: #44475a; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; font-size: 16px; box-sizing: border-box; }
        button { width: 22%; padding: 10px; margin: 1%; cursor: pointer; border-radius: 5px; border: none; background: #bd93f9; font-weight: bold; }
        button:hover { background: #ff79c6; }
        #result { font-size: 20px; margin-top: 15px; text-align: center; color: #50fa7b; }
    </style>
</head>
<body>

<div class="calc-card">
    <h3>Simple Calculator</h3>
    <input type="number" id="num1" placeholder="First Number">
    <input type="number" id="num2" placeholder="Second Number">
    
    <div>
        <button onclick="calc('+')">+</button>
        <button onclick="calc('-')">-</button>
        <button onclick="calc('*')">*</button>
        <button onclick="calc('/')">/</button>
    </div>

    <div id="result">Result: ?</div>
</div>

<script>
    function calc(operator) {
        const n1 = parseFloat(document.getElementById('num1').value);
        const n2 = parseFloat(document.getElementById('num2').value);
        let res = 0;

        if (isNaN(n1) || isNaN(n2)) {
            alert("Please enter numbers!");
            return;
        }

        if (operator === '+') res = n1 + n2;
        if (operator === '-') res = n1 - n2;
        if (operator === '*') res = n1 * n2;
        if (operator === '/') res = n2 !== 0 ? n1 / n2 : "Error (Div by 0)";

        document.getElementById('result').innerText = "Result: " + res;
    }
</script>

</body>
</html>
